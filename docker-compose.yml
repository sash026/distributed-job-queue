services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn api.producer:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    restart: unless-stopped

  worker-high:
    build: .
    command: python -m worker.worker --queues high
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    restart: unless-stopped

  worker-default:
    build: .
    command: python -m worker.worker --queues default
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    restart: unless-stopped

  worker-default-low:
    build: .
    command: python -m worker.worker --queues default,low
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    restart: unless-stopped

  monitor:
    build: .
    command: python -m worker.monitor
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
